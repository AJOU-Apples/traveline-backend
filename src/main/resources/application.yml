spring:
  application:
    name: traveline-backend
  
  # Database
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL:jdbc:postgresql://localhost:5432/traveline_test_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:1234}
  
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect
  
  # File Upload
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
      file-size-threshold: 2KB

# JWT
jwt:
  secret: ${JWT_SECRET:changeme-development-only-secret-key-for-jwt-token-generation-256-bits}
  access-token-validity: 3600000000      # 1시간 (밀리초)
  refresh-token-validity: 604800000   # 7일 (밀리초)

# Google Maps API
google:
  maps:
    api-key: ${GOOGLE_MAPS_API_KEY:your-api-key-here}

# Amadeus API
amadeus:
  api-key: ${AMADEUS_API_KEY}
  api-secret: ${AMADEUS_API_SECRET}
  api-url: ${AMADEUS_API_URL:https://test.api.amadeus.com}

# File Storage
file:
  upload:
    base-path: ${FILE_UPLOAD_PATH:uploads}

# Logging
logging:
  level:
    org.apples.travelinebackend: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: OFF
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# Invite Code
app:
  invite-link:
    expiration-days: ${INVITE_LINK_EXPIRATION_DAYS:7}