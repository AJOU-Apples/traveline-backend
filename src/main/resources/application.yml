spring:
  application:
    name: traveline-backend
  
  # Database
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/traveline_test_db
    username: postgres
    password: '1234'
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

# JWT
jwt:
  secret: ${JWT_SECRET:traveline-secret-key-for-jwt-token-generation-must-be-at-least-256-bits-long}
  access-token-validity: 3600000      # 1시간 (밀리초)
  refresh-token-validity: 604800000   # 7일 (밀리초)

# Logging
logging:
  level:
    org.apples.travelinebackend: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE