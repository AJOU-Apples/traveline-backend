spring:
  application:
    name: traveline-backend
  
  # Database
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL:jdbc:postgresql://localhost:5432/traveline_test_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:1234}
  
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: ${SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  
  # File Upload
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
      file-size-threshold: 2KB

# JWT
jwt:
  secret: ${JWT_SECRET:changeme-development-only-secret-key-for-jwt-token-generation-256-bits}
  access-token-validity: 3600000      # 1시간 (밀리초)
  refresh-token-validity: 604800000   # 7일 (밀리초)

# Google Maps API
google:
  maps:
    api-key: ${GOOGLE_MAPS_API_KEY:your-api-key-here}

# File Storage
file:
  upload:
    base-path: ${FILE_UPLOAD_PATH:uploads}

# Logging
logging:
  level:
    org.apples.travelinebackend: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE